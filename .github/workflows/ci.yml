name: Swift Package Cross-Platform CI (iOS-Logic & Linux)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# ワークフロー全体で Node 24 への移行を先取りして警告を消す
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    # Linux環境のときだけ、Swift 6.0の公式Dockerイメージをコンテナとして指定する
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Appleプラットフォーム（iOS/macOS共用ロジック）向けのビルド環境
          - platform: Apple-Platform
            os: macos-14 # 💡 macos-14 に下げることで、標準のSwift 5.10環境になります
            container: null # Mac環境ではコンテナを使用しない

          # Linux向けのビルド環境
          - platform: Linux
            os: ubuntu-latest
            container: "swift:5.10" # Linux環境ではSwift公式コンテナを使用

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # Appleプラットフォーム（Mac）のときだけ、明確にXcode 15.4（Swift 5.10）を選択する
      - name: Setup Swift
        if: matrix.platform == 'Apple-Platform'
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      # 依存関係（外部Packageなど）の解決
      - name: Resolve dependencies
        run: swift package resolve

      # Package標準のコマンドでビルドとテストを実行
      - name: Run Tests
        run: swift test -v
